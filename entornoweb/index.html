<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monitor Náutico</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🚢 Monitor Náutico</h1>
    <div class="card">
      <h2>🔋 Batería 1</h2>
      <p><strong>Voltaje:</strong> <span id="voltage0">--</span> V</p>
      <p><strong>SoC:</strong> <span id="soc0">--</span>%</p>
    </div>
    <div class="card">
      <h2>💧 Agua</h2>
      <p><strong>Nivel:</strong> <span id="water">--</span>%</p>
    </div>
    <div class="card">
      <h2>🌡️ Ambiente</h2>
      <p><strong>Temp:</strong> <span id="temp">--</span> °C</p>
      <p><strong>Humedad:</strong> <span id="humidity">--</span>%</p>
    </div>
    <div class="card">
      <h2>⚡ Corriente</h2>
      <p><strong>Consumo:</strong> <span id="current">--</span> A</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
